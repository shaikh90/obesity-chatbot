<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obesity Expert AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Fat Loss AI Expert</h2>
            <p>Roman Urdu aur English mein baat karein</p>
        </div>
        <div id="chat-box" class="chat-box">
            <!-- Messages yahan nazar ayenge -->
            <div class="message ai-message">Asalam-o-Alaikum! Main obesity expert hoon. Wazan kam karne ke bare mein kuch bhi pochein.</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Yahan apna sawal likhein...">
            <button id="send-btn">Bhejein</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
